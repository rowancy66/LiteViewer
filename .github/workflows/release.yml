name: Build Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-release:
    runs-on: macos-14
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Swift Version
        run: swift --version

      - name: Run Core Checks
        run: swift run LiteViewerCoreChecks

      - name: Build DMG And Release Assets
        run: bash scripts/build-app.sh

      - name: Upload Workflow Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: liteviewer-release-assets
          path: dist/release/*

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/release/*
          generate_release_notes: true
